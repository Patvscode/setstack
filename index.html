<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Status Strip — sits above tab bar, shows current workout info -->
    <div class="status-strip" id="status-strip">
        <div class="status-info">
            <span class="status-name" id="status-name"></span>
            <span class="status-detail" id="status-detail"></span>
        </div>
        <span class="status-progress" id="status-progress"></span>
        <button class="btn-timer" id="rest-timer-btn" onclick="toggleRestTimer()" style="display:none">⏱ 0:00</button>
        <div class="mini-progress"><div class="mini-progress-fill" id="status-progress-fill"></div></div>
    </div>

    <nav class="tab-bar">
        <button class="tab active" data-view="today">Today</button>
        <button class="tab" data-view="plans">Plans</button>
        <button class="tab" data-view="log">Log</button>
        <button class="tab" data-view="progress">Progress</button>
        <button class="tab" data-view="goals">Goals</button>
        <button class="tab" data-view="settings">⚙️</button>
    </nav>

    <main>
        <!-- TODAY VIEW -->
        <section id="view-today" class="view active">
            <div class="today-header">
                <h1 id="today-date"></h1>
                <p id="today-dayname"></p>
            </div>
            <div id="today-workout"></div>
        </section>

        <!-- PLANS VIEW -->
        <section id="view-plans" class="view">
            <div class="plans-header">
                <h2>Training Plans</h2>
                <button class="btn btn-primary" onclick="openCreatePlan()">+ New Plan</button>
            </div>
            <div id="plan-list"></div>
        </section>

        <!-- ROUTINE EDITOR VIEW (shown when editing a routine) -->
        <section id="view-routine-editor" class="view">
            <div class="routine-header">
                <button class="btn btn-sm" onclick="goBackFromRoutine()">← Back</button>
                <h2 id="routine-editor-title">New Routine</h2>
            </div>
            <div id="routine-editor-content"></div>
        </section>

        <!-- LOG VIEW -->
        <section id="view-log" class="view">
            <h2>Workout Log</h2>
            <div id="log-list"></div>
        </section>

        <!-- PROGRESS VIEW -->
        <section id="view-progress" class="view">
            <h2>Progress</h2>
            <div id="progress-content"></div>
        </section>

        <!-- GOALS VIEW -->
        <section id="view-goals" class="view">
            <h2>Goals</h2>
            <div id="goals-content"></div>
        </section>

        <!-- SETTINGS VIEW -->
        <section id="view-settings" class="view">
            <h2>Settings</h2>
            <div id="settings-content"></div>
        </section>
    </main>

    <!-- Plan Editor Modal -->
    <div id="plan-modal" class="modal" style="display:none">
        <div class="modal-content plan-editor">
            <div class="modal-header">
                <h3 id="plan-editor-title">New Plan</h3>
                <button class="close-btn" onclick="closePlanModal()">✕</button>
            </div>
            <div id="plan-editor-body"></div>
        </div>
    </div>

    <!-- Quick Weight Presets Modal -->
    <div id="weight-modal" class="modal" style="display:none">
        <div class="modal-content weight-presets">
            <div class="modal-header">
                <h3>Quick Weight</h3>
                <button class="close-btn" onclick="closeWeightModal()">✕</button>
            </div>
            <div id="weight-preset-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
